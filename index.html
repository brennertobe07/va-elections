<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virginia Candidate Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0f14;
    --surface:   #161920;
    --border:    #252830;
    --accent:    #c8a84b;
    --accent2:   #4b7fc8;
    --dem:       #2a6ebb;
    --rep:       #c0392b;
    --ind:       #7f8c8d;
    --text:      #e8eaf0;
    --muted:     #6b7280;
    --win:       #27ae60;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 24px 40px;
    display: flex;
    align-items: baseline;
    gap: 20px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: var(--accent);
  }

  header .subtitle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  #meta-bar {
    margin-left: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-align: right;
    line-height: 1.6;
  }

  /* FILTERS */
  .filters {
    padding: 16px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
  }

  .filter-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .filter-group label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  select, input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.8rem;
    border-radius: 2px;
    outline: none;
    min-width: 140px;
  }

  select:focus, input:focus {
    border-color: var(--accent);
  }

  input[type="text"] { min-width: 200px; }

  .filter-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    padding: 6px 0;
    white-space: nowrap;
    margin-left: auto;
    align-self: flex-end;
  }

  button.clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: 0.05em;
    align-self: flex-end;
  }

  button.clear-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* TABLE */
  .table-wrap {
    overflow-x: auto;
    padding: 0 40px 40px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
    margin-top: 0;
  }

  thead th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-align: left;
    padding: 12px 10px 8px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }

  thead th:hover { color: var(--accent); }
  thead th.sorted { color: var(--accent); }
  thead th .sort-arrow { margin-left: 4px; opacity: 0.5; }
  thead th.sorted .sort-arrow { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }

  tbody tr:hover { background: var(--surface); }

  td {
    padding: 10px 10px;
    vertical-align: middle;
    white-space: nowrap;
  }

  td.name-cell {
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
  }

  td.name-cell .committee {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .party-badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 2px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .party-D  { background: rgba(42,110,187,0.2); color: #5b9dd9; border: 1px solid rgba(42,110,187,0.4); }
  .party-R  { background: rgba(192,57,43,0.2);  color: #e05a48; border: 1px solid rgba(192,57,43,0.4); }
  .party-I  { background: rgba(127,140,141,0.2); color: #a0adb0; border: 1px solid rgba(127,140,141,0.4); }
  .party-L  { background: rgba(243,156,18,0.2); color: #f3a52a; border: 1px solid rgba(243,156,18,0.4); }
  .party-SD { background: rgba(42,110,187,0.2); color: #5b9dd9; border: 1px solid rgba(42,110,187,0.4); }
  .party-SR { background: rgba(192,57,43,0.2);  color: #e05a48; border: 1px solid rgba(192,57,43,0.4); }
  .party-UN { background: rgba(127,140,141,0.2); color: #a0adb0; border: 1px solid rgba(127,140,141,0.4); }

  .won-badge {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--win);
    margin-right: 4px;
    vertical-align: middle;
  }

  .support-bar {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .support-bar .bar {
    width: 60px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .support-bar .fill {
    height: 100%;
    background: var(--dem);
    border-radius: 2px;
  }

  .support-bar .val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    min-width: 36px;
  }

  .money {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--accent);
  }

  .votes {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
  }

  .null-val { color: var(--muted); font-style: italic; font-size: 0.65rem; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    width: 700px;
    max-width: 95vw;
    max-height: 88vh;
    overflow-y: auto;
    border-radius: 4px;
    padding: 32px;
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 20px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.4rem;
    cursor: pointer;
    line-height: 1;
  }

  .modal-close:hover { color: var(--text); }

  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .modal .modal-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    margin-bottom: 24px;
    letter-spacing: 0.05em;
  }

  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .modal-section {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 16px;
  }

  .modal-section.full { grid-column: 1 / -1; }

  .modal-section h3 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .modal-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 0.75rem;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }

  .modal-row:last-child { border-bottom: none; }

  .modal-row .lbl {
    color: var(--muted);
    font-size: 0.7rem;
  }

  .modal-row .val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    text-align: right;
    max-width: 60%;
    word-break: break-word;
    white-space: normal;
  }

  /* LOADING */
  #loading {
    text-align: center;
    padding: 80px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 10px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div>
    <h1>Virginia Candidate Explorer</h1>
    <div class="subtitle">DPVA · Election Results + Campaign Finance + Voter File</div>
  </div>
  <div id="meta-bar">Loading...</div>
</header>

<div class="filters">
  <div class="filter-group">
    <label>Search</label>
    <input type="text" id="search" placeholder="Name, locality, district...">
  </div>
  <div class="filter-group">
    <label>Election Year</label>
    <select id="filter-year"><option value="">All Years</option></select>
  </div>
  <div class="filter-group">
    <label>Office Type</label>
    <select id="filter-office-type">
      <option value="">All Offices</option>
      <option value="State">State</option>
      <option value="Local">Local</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Office</label>
    <select id="filter-office"><option value="">All</option></select>
  </div>
  <div class="filter-group">
    <label>Locality</label>
    <select id="filter-locality"><option value="">All Localities</option></select>
  </div>
  <div class="filter-group">
    <label>Party</label>
    <select id="filter-party">
      <option value="">All Parties</option>
      <option value="Democratic">Democratic</option>
      <option value="Republican">Republican</option>
      <option value="Independent">Independent</option>
      <option value="Libertarian">Libertarian</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Result</label>
    <select id="filter-won">
      <option value="">All</option>
      <option value="1">Winners Only</option>
      <option value="0">Non-Winners</option>
    </select>
  </div>
  <button class="clear-btn" onclick="clearFilters()">Clear</button>
  <div class="filter-count" id="filter-count"></div>
</div>

<div class="table-wrap">
  <div id="loading"><span class="spinner"></span>Loading election data...</div>
  <table id="main-table" style="display:none">
    <thead>
      <tr>
        <th onclick="sortBy('CandidateLastName')" data-col="CandidateLastName">Candidate <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('ElectionDate')" data-col="ElectionDate">Election <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('OfficeSoughtName')" data-col="OfficeSoughtName">Office <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('LocalityName')" data-col="LocalityName">Locality <span class="sort-arrow">↕</span></th>
        <th>Party</th>
        <th onclick="sortBy('TotalVotes')" data-col="TotalVotes">Votes <span class="sort-arrow">↕</span></th>
        <th>Result</th>
        <th onclick="sortBy('TotalAmount')" data-col="TotalAmount">Total Raised <span class="sort-arrow">↕</span></th>
        <th>Dem Support</th>
        <th>Districts</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <button class="modal-close" onclick="closeModalDirect()">×</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ============================================================
// DATA & STATE
// ============================================================
let allCandidates = [];
let filtered = [];
let sortCol = 'ElectionDate';
let sortDir = -1; // -1 = desc, 1 = asc
let currentPage = 0;
const PAGE_SIZE = 200;

// ============================================================
// LOAD DATA
// ============================================================
async function loadData() {
  try {
    const [cRes, eRes, oRes, lRes, mRes] = await Promise.all([
      fetch('data/candidates.json'),
      fetch('data/elections.json'),
      fetch('data/offices.json'),
      fetch('data/localities.json'),
      fetch('data/meta.json')
    ]);

    allCandidates = await cRes.json();
    const elections  = await eRes.json();
    const offices    = await oRes.json();
    const localities = await lRes.json();
    const meta       = await mRes.json();

    populateFilters(elections, offices, localities);
    updateMeta(meta);
    applyFilters();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('main-table').style.display = 'table';
  } catch(e) {
    document.getElementById('loading').innerHTML =
      '<span style="color:#e05a48">Error loading data. Make sure data/ files exist.</span><br>' +
      '<small style="color:#6b7280">' + e.message + '</small>';
  }
}

// ============================================================
// POPULATE DROPDOWNS
// ============================================================
function populateFilters(elections, offices, localities) {
  const yearSel = document.getElementById('filter-year');
  const years = [...new Set(elections.map(e => e.ElectionYear).filter(Boolean))].sort().reverse();
  years.forEach(y => {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    yearSel.appendChild(o);
  });

  const officeSel = document.getElementById('filter-office');
  offices.forEach(o => {
    const el = document.createElement('option');
    el.value = o.OfficeSoughtName;
    el.textContent = o.OfficeSoughtName + ' (' + o.CandidateCount + ')';
    officeSel.appendChild(el);
  });

  const locSel = document.getElementById('filter-locality');
  localities.forEach(l => {
    const el = document.createElement('option');
    el.value = l.LocalityName;
    el.textContent = l.LocalityName;
    locSel.appendChild(el);
  });
}

function updateMeta(meta) {
  document.getElementById('meta-bar').innerHTML =
    `${(meta.TotalCandidates||0).toLocaleString()} candidates &nbsp;|&nbsp; ` +
    `${(meta.Winners||0).toLocaleString()} winners &nbsp;|&nbsp; ` +
    `Last refresh: ${meta.LastRefreshDate ? meta.LastRefreshDate.substring(0,10) : 'unknown'}`;
}

// ============================================================
// FILTERING
// ============================================================
function applyFilters() {
  const search  = document.getElementById('search').value.toLowerCase().trim();
  const year    = document.getElementById('filter-year').value;
  const offType = document.getElementById('filter-office-type').value;
  const office  = document.getElementById('filter-office').value;
  const locality= document.getElementById('filter-locality').value;
  const party   = document.getElementById('filter-party').value;
  const won     = document.getElementById('filter-won').value;

  filtered = allCandidates.filter(c => {
    if (search) {
      const hay = [c.CandidateFirstName, c.CandidateLastName, c.CandidateFullName,
                   c.LocalityName, c.DistrictName, c.OfficeSoughtName,
                   c.CommitteeName].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    if (year && c.ElectionDate) {
      const ey = c.ElectionDate.length >= 4 ? c.ElectionDate.substring(c.ElectionDate.length - 2) : '';
      const fullYear = c.ElectionDate.includes('/') ?
        (c.ElectionDate.split('/')[2]?.length === 2 ?
          '20' + c.ElectionDate.split('/')[2] : c.ElectionDate.split('/')[2]) : '';
      if (fullYear !== year) return false;
    }
    if (offType && c.OfficeType !== offType) return false;
    if (office && c.OfficeSoughtName !== office) return false;
    if (locality && c.LocalityName !== locality) return false;
    if (party && c.PartyCode !== party) return false;
    if (won !== '' && String(c.Won) !== won) return false;
    return true;
  });

  sortData();
  renderTable();
  document.getElementById('filter-count').textContent =
    filtered.length.toLocaleString() + ' of ' + allCandidates.length.toLocaleString() + ' candidates';
}

function clearFilters() {
  document.getElementById('search').value = '';
  document.getElementById('filter-year').value = '';
  document.getElementById('filter-office-type').value = '';
  document.getElementById('filter-office').value = '';
  document.getElementById('filter-locality').value = '';
  document.getElementById('filter-party').value = '';
  document.getElementById('filter-won').value = '';
  applyFilters();
}

// ============================================================
// SORTING
// ============================================================
function sortBy(col) {
  if (sortCol === col) {
    sortDir *= -1;
  } else {
    sortCol = col;
    sortDir = col === 'ElectionDate' ? -1 : 1;
  }
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  const th = document.querySelector(`thead th[data-col="${col}"]`);
  if (th) {
    th.classList.add('sorted');
    th.querySelector('.sort-arrow').textContent = sortDir === 1 ? '↑' : '↓';
  }
  sortData();
  renderTable();
}

function sortData() {
  filtered.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (va === null || va === undefined) return 1;
    if (vb === null || vb === undefined) return -1;
    if (typeof va === 'number') return (va - vb) * sortDir;
    return String(va).localeCompare(String(vb)) * sortDir;
  });
}

// ============================================================
// RENDER TABLE
// ============================================================
function renderTable() {
  const tbody = document.getElementById('table-body');
  const rows = filtered.slice(0, PAGE_SIZE);
  tbody.innerHTML = rows.map(c => rowHTML(c)).join('');
}

function partyBadge(party, likelyParty) {
  // Use filed party first, fall back to LikelyParty
  const p = party || '';
  const lp = likelyParty || '';
  let cls = 'party-I', label = p || lp || '—';

  if (p.includes('Democratic') || lp === 'SD') { cls = 'party-D'; label = p || 'Dem (modeled)'; }
  else if (p.includes('Republican') || lp === 'SR') { cls = 'party-R'; label = p || 'Rep (modeled)'; }
  else if (p.includes('Libertarian')) { cls = 'party-L'; label = 'Lib'; }
  else if (!p && lp) { label = lp; }

  return `<span class="party-badge ${cls}">${label.length > 18 ? label.substring(0,15)+'…' : label}</span>`;
}

function supportBar(score) {
  if (!score) return '<span class="null-val">—</span>';
  const pct = parseFloat(score);
  return `<div class="support-bar">
    <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
    <span class="val">${pct.toFixed(1)}%</span>
  </div>`;
}

function fmt$( val) {
  if (val === null || val === undefined) return '<span class="null-val">—</span>';
  return '$' + parseFloat(val).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
}

function fmtVotes(val) {
  if (val === null || val === undefined) return '<span class="null-val">—</span>';
  return parseInt(val).toLocaleString();
}

function fmtDistricts(c) {
  const parts = [];
  if (c.Current_CD) parts.push('CD-' + c.Current_CD);
  if (c.SD) parts.push('SD-' + c.SD);
  if (c.HD) parts.push('HD-' + c.HD);
  return parts.length ? `<span style="font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--muted)">${parts.join(' ')}</span>` : '<span class="null-val">—</span>';
}

function rowHTML(c) {
  const won = c.Won ? `<span class="won-badge"></span>Won` : `<span style="color:var(--muted)">—</span>`;
  const name = (c.CandidateFullName || ((c.CandidateFirstName||'') + ' ' + (c.CandidateLastName||''))).trim();
  return `<tr onclick="showDetail(${c.SummaryId})">
    <td class="name-cell">
      ${name}
      <div class="committee">${c.CommitteeCode||''}</div>
    </td>
    <td style="font-family:'IBM Plex Mono',monospace;font-size:0.7rem">${c.ElectionDate||'—'}</td>
    <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis" title="${c.OfficeSoughtName||''}">${c.OfficeSoughtName||'—'}</td>
    <td>${c.LocalityName||'—'}</td>
    <td>${partyBadge(c.PartyCode, c.LikelyParty)}</td>
    <td class="votes">${fmtVotes(c.TotalVotes)}</td>
    <td>${won}</td>
    <td class="money">${fmt$(c.TotalAmount)}</td>
    <td>${supportBar(c.DNCDemPartySupport)}</td>
    <td>${fmtDistricts(c)}</td>
  </tr>`;
}

// ============================================================
// DETAIL MODAL
// ============================================================
let candidateMap = {};

function showDetail(id) {
  if (!candidateMap[id]) {
    candidateMap = {};
    allCandidates.forEach(c => { candidateMap[c.SummaryId] = c; });
  }
  const c = candidateMap[id];
  if (!c) return;

  const name = (c.CandidateFullName || ((c.CandidateFirstName||'') + ' ' + (c.CandidateMiddleName||'') + ' ' + (c.CandidateLastName||'') + ' ' + (c.CandidateSuffix||''))).replace(/\s+/g,' ').trim();

  const row = (lbl, val, fmt) => {
    const v = val !== null && val !== undefined && val !== '' ? (fmt ? fmt(val) : val) : '—';
    return `<div class="modal-row"><span class="lbl">${lbl}</span><span class="val">${v}</span></div>`;
  };

  document.getElementById('modal-body').innerHTML = `
    <h2>${name}</h2>
    <div class="modal-sub">${c.CommitteeCode||''} &nbsp;·&nbsp; ${c.ElectionDate||''} &nbsp;·&nbsp; ${c.OfficeSoughtName||''}</div>

    <div class="modal-grid">
      <div class="modal-section">
        <h3>Election</h3>
        ${row('Election Date', c.ElectionDate)}
        ${row('Election Name', c.ElectionName)}
        ${row('Office', c.OfficeSoughtName)}
        ${row('Office Type', c.OfficeType)}
        ${row('Locality', c.LocalityName)}
        ${row('District', c.DistrictName)}
        ${row('Filed Party', c.PoliticalPartyName)}
        ${row('Result Party', c.PartyCode)}
        ${row('Total Votes', c.TotalVotes, v => parseInt(v).toLocaleString())}
        ${row('Won', c.Won ? '✓ Yes' : 'No')}
      </div>

      <div class="modal-section">
        <h3>Campaign Finance</h3>
        ${row('Committee', c.CommitteeName)}
        ${row('Total Raised', c.TotalAmount, v => '$' + parseFloat(v).toLocaleString())}
        ${row('Largest Gift', c.MaxAmount, v => '$' + parseFloat(v).toLocaleString())}
        ${row('Avg Gift', c.AvgAmount, v => '$' + parseFloat(v).toFixed(2))}
        ${row('Contribution Count', c.ContributionCount, v => parseInt(v).toLocaleString())}
        ${row('First Contribution', c.FirstContribDate)}
        ${row('Last Contribution', c.LastContribDate)}
        ${row('Last Type', c.LastDType)}
        ${row('Has Fed Contribs', c.HasFedContrib ? 'Yes' : 'No')}
        ${row('Has State Contribs', c.HasStateContrib ? 'Yes' : 'No')}
        ${row('Has DPVA Contribs', c.HasDPVAContrib ? 'Yes' : 'No')}
        ${row('Has ActBlue', c.HasABContrib ? 'Yes' : 'No')}
      </div>

      <div class="modal-section">
        <h3>Voter File</h3>
        ${row('State File ID', c.StateFileID)}
        ${row('VAN ID', c.VoterRegistrationid)}
        ${row('Likely Party', c.LikelyParty)}
        ${row('Dem Support Score', c.DNCDemPartySupport, v => parseFloat(v).toFixed(2) + '%')}
        ${row('VAN Match', c.VAN_MatchStatus)}
      </div>

      <div class="modal-section">
        <h3>Districts</h3>
        ${row('Current CD', c.Current_CD)}
        ${row('Current CD Member', c.Current_CD_Member)}
        ${row('Current CD Party', c.Current_CD_Party)}
        ${row('New CD', c.New_CD)}
        ${row('Senate District', c.SD)}
        ${row('SD Member', c.SD_Member)}
        ${row('SD Party', c.SD_Party)}
        ${row('House District', c.HD)}
        ${row('HD Member', c.HD_Member)}
        ${row('HD Party', c.HD_Party)}
        ${row('District Match', c.District_MatchStatus)}
      </div>
    </div>
  `;

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('filter-year').addEventListener('change', applyFilters);
document.getElementById('filter-office-type').addEventListener('change', applyFilters);
document.getElementById('filter-office').addEventListener('change', applyFilters);
document.getElementById('filter-locality').addEventListener('change', applyFilters);
document.getElementById('filter-party').addEventListener('change', applyFilters);
document.getElementById('filter-won').addEventListener('change', applyFilters);

// ============================================================
// INIT
// ============================================================
loadData();
</script>
